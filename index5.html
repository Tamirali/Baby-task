<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tamir Ali · Hindi Lab (सभी स्वर)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Nirmala UI', 'Arial', sans-serif;
            background: #e3f2fd;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* ===== DISPLAY SECTION ===== */
        .display-section {
            height: 30%;
            background: #fff8e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 6px solid #f57c00;
            box-shadow: 0 4px 12px #ffb74d;
            padding: 5px 10px;
        }

        #output {
            font-size: min(12vw, 80px);
            font-weight: 800;
            color: #b71c1c;
            min-height: 100px;
            text-shadow: 3px 3px 0 #ffccbc;
            line-height: 1.4;
            margin: 0 0 8px 0;
            font-family: 'Nirmala UI', 'Kokila', 'Arial';
            word-break: break-all;
            text-align: center;
            max-width: 100%;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 10px;
            border: 3px solid #ffb300;
            box-shadow: inset 0 2px 8px #ffe082;
            overflow-y: auto;
            max-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 5px;
            width: 100%;
        }

        .clear-btn, .backspace-btn, .speak-icon-btn {
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.04s linear;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid white;
        }

        .clear-btn { background: #ff7043; color: white; box-shadow: 0 5px 0 #bf3600; }
        .backspace-btn { background: #fbc02d; color: #1f2e3a; box-shadow: 0 5px 0 #b08d00; }
        .speak-icon-btn { background: #2e7d32; color: white; box-shadow: 0 5px 0 #1b5e20; }

        .clear-btn:active, .backspace-btn:active, .speak-icon-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        /* ===== KEYBOARD SECTION ===== */
        .keyboard-section {
            height: 70%;
            display: flex;
            overflow: hidden;
            background: #bbdefb;
            border-top: 4px solid #ffb300;
        }

        /* Left: स्वर + मात्राएँ */
        .matra-col {
            width: 38%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 4px;
            overflow-y: auto;
            background: #ffe0b2;
            border-right: 4px solid #e65100;
        }

        .matra-col h3, .varna-col h3 {
            margin: 0 0 6px 0;
            font-size: 16px;
            text-align: center;
            background: #ffb74d;
            padding: 6px 0;
            border-radius: 40px;
            color: #1b2b40;
            border: 2px solid #bf360c;
            flex-shrink: 0;
        }

        /* Right: व्यंजन */
        .varna-col {
            width: 62%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            padding: 8px 4px;
            overflow-y: auto;
            background: #e1f0fa;
        }

        .key {
            padding: 12px 2px;
            font-size: 26px;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7f8c8d, 0 4px 8px rgba(0,0,0,0.15);
            text-align: center;
            transition: 0.04s linear;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nirmala UI', 'Kokila', 'Arial';
            background: white;
        }

        .key:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #6f7c7d;
        }

        .varna-btn {
            background: white;
            color: #0d3f66;
            border: 2px solid #90caf9;
        }

        .matra-btn {
            background: #ff9800;
            color: white;
            text-shadow: 1px 1px 0 #b26a00;
            font-size: 28px;
            border: 2px solid #ffe082;
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
        }

        .matra-sub {
            font-size: 12px;
            background: #4527a0;
            color: white;
            padding: 2px 6px;
            border-radius: 30px;
            font-weight: 500;
        }

        .footer-note {
            font-size: 13px;
            color: #01579b;
            text-align: center;
            padding: 4px;
            background: #fff9c4;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="display-section">
    <div id="output">क</div>
    <div class="action-btns">
        <button class="clear-btn" onclick="clearAll()">🗑️ सब मिटाओ</button>
        <button class="backspace-btn" onclick="backspace()">⌫ एक मिटाओ</button>
        <button class="speak-icon-btn" onclick="speakCurrent()"><span>🔊</span> बोलो</button>
    </div>
</div>

<div class="keyboard-section">
    <div class="matra-col">
        <h3>✨ स्वर (Vowels) ✨</h3>
        <button class="key matra-btn" onclick="addSwarToWord('अ')">अ<span class="matra-sub">a</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('आ')">आ<span class="matra-sub">aa</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('इ')">इ<span class="matra-sub">i</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ई')">ई<span class="matra-sub">ee</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('उ')">उ<span class="matra-sub">u</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ऊ')">ऊ<span class="matra-sub">oo</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ऋ')">ऋ<span class="matra-sub">ri</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ए')">ए<span class="matra-sub">e</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ऐ')">ऐ<span class="matra-sub">ai</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('ओ')">ओ<span class="matra-sub">o</span></button>
        <button class="key matra-btn" onclick="addSwarToWord('औ')">औ<span class="matra-sub">au</span></button>
        
        <h3 style="margin-top: 10px;">✨ मात्राएँ ✨</h3>
        <button class="key matra-btn" data-matra="्" onclick="addMatraToWord(this)">्<span class="matra-sub">halant</span></button>
        <button class="key matra-btn" data-matra="ा" onclick="addMatraToWord(this)">ा<span class="matra-sub">आ</span></button>
        <button class="key matra-btn" data-matra="ि" onclick="addMatraToWord(this)">ि<span class="matra-sub">इ</span></button>
        <button class="key matra-btn" data-matra="ी" onclick="addMatraToWord(this)">ी<span class="matra-sub">ई</span></button>
        <button class="key matra-btn" data-matra="ُ" onclick="addMatraToWord(this)">ु<span class="matra-sub">उ</span></button>
        <button class="key matra-btn" data-matra="ू" onclick="addMatraToWord(this)">ू<span class="matra-sub">ऊ</span></button>
        <button class="key matra-btn" data-matra="ृ" onclick="addMatraToWord(this)">ृ<span class="matra-sub">ऋ</span></button>
        <button class="key matra-btn" data-matra="े" onclick="addMatraToWord(this)">े<span class="matra-sub">ए</span></button>
        <button class="key matra-btn" data-matra="ै" onclick="addMatraToWord(this)">ै<span class="matra-sub">ऐ</span></button>
        <button class="key matra-btn" data-matra="ो" onclick="addMatraToWord(this)">ो<span class="matra-sub">ओ</span></button>
        <button class="key matra-btn" data-matra="ौ" onclick="addMatraToWord(this)">ौ<span class="matra-sub">औ</span></button>
        <button class="key matra-btn" data-matra="ं" onclick="addMatraToWord(this)">ं<span class="matra-sub">अनु</span></button>
        <button class="key matra-btn" data-matra="ः" onclick="addMatraToWord(this)">ः<span class="matra-sub">विसर्ग</span></button>
    </div>

    <div class="varna-col" id="varnasContainer">
        <h3 style="grid-column: span 4;">🔤 व्यंजन + संयुक्त</h3>
    </div>
</div>

<div class="footer-note">⭐ सभी स्वर एवं मात्राएँ शुद्धता के साथ समायोजित - तामीर अली ⭐</div>

<script>
    (function() {
        let currentWord = "क";
        const outputEl = document.getElementById('output');
        const varnaContainer = document.getElementById('varnasContainer');

        const vyanjanList = [
            'क', 'ख', 'ग', 'घ', 'ङ',
            'च', 'छ', 'ज', 'झ', 'ञ',
            'ट', 'ठ', 'ड', 'ढ', 'ण',
            'त', 'थ', 'द', 'ध', 'न',
            'प', 'फ', 'ब', 'भ', 'म',
            'य', 'र', 'ल', 'व', 'श',
            'ष', 'स', 'ह', 'क्ष', 'त्र', 'ज्ञ'
        ];

        // 4-कॉलम ग्रिड के अनुसार डायनेमिक बटन रेंडरिंग
        vyanjanList.forEach(v => {
            let btn = document.createElement('button');
            btn.className = 'key varna-btn';
            btn.innerText = v;
            btn.onclick = function() {
                addCharToWord(v);
            };
            varnaContainer.appendChild(btn);
        });

        function addCharToWord(ch) {
            if (currentWord.length < 12) {
                currentWord += ch;
                updateDisplayAndSpeak();
            }
        }

        window.addSwarToWord = function(swar) {
            if (currentWord.length < 12) {
                currentWord += swar;
                updateDisplayAndSpeak();
            }
        };

        // मात्राओं को सही यूनिकोड के तहत जोड़ने का लॉजिक
        window.addMatraToWord = function(button) {
            let matra = button.getAttribute('data-matra') || '';
            if (currentWord.length > 0 && currentWord.length < 12) {
                currentWord += matra;
                updateDisplayAndSpeak();
            }
        };

        // हिंदी यूनिकोड (कम्बाइनिंग कैरेक्टर्स) को सुरक्षित डिलीट करने का बेहतर तरीका
        window.backspace = function() {
            if (currentWord.length > 0) {
                // यह कम्बाइनिंग मात्रा और मूल अक्षर दोनों को यूनिकोड कोडपॉइंट्स के आधार पर सही से हटाता है
                currentWord = currentWord.normalize('NFC');
                let cp = [...currentWord];
                cp.pop();
                currentWord = cp.join('');
            }
            updateDisplayAndSpeak();
        };

        window.clearAll = function() {
            currentWord = "";
            updateDisplayAndSpeak();
        };

        function updateDisplayAndSpeak() {
            outputEl.innerText = currentWord || "---";
            if(currentWord) {
                speakText(currentWord);
            }
        }

        window.speakCurrent = function() {
            speakText(outputEl.innerText === "---" ? 'खाली' : outputEl.innerText);
        };

        function speakText(text) {
            if (!text || text.trim() === '' || text === '---') return;
            try {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                }
                // ब्राउज़र ओवरलोड से बचने के लिए टाइमआउट फिक्स
                setTimeout(() => {
                    let utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'hi-IN';
                    utterance.rate = 0.7;
                    utterance.pitch = 1.1;

                    if (window.speechSynthesis.getVoices) {
                        let voices = window.speechSynthesis.getVoices();
                        let hindiVoice = voices.find(v => v.lang === 'hi-IN' && v.name.includes('Google'));
                        if (!hindiVoice) hindiVoice = voices.find(v => v.lang === 'hi-IN');
                        if (hindiVoice) utterance.voice = hindiVoice;
                    }
                    window.speechSynthesis.speak(utterance);
                }, 50);
            } catch (e) {
                console.warn('Speech error', e);
            }
        }

        // इनिशियल रेंडर
        updateDisplayAndSpeak();
        outputEl.addEventListener('click', speakCurrent);
    })();
</script>
</body>
</html>
