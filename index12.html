<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#142f2b" />
    <meta name="description" content="Tamir Ali Visfot News Vocal Lip Sync Portal" />
    <title>Tamir Ali Visfot News</title>
    <style>
        :root {
            --ink: #17332f;
            --ink-soft: #536863;
            --paper: #fbf5e9;
            --paper-deep: #eee2cc;
            --red: #bf4d3c;
            --red-deep: #8f332a;
            --gold: #e9b949;
            --green: #3f7568;
            --white: #fffdf7;
            --shadow: 0 24px 70px rgba(8, 31, 27, 0.32);
            --record-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { min-width: 320px; background: #0a1f1b; }
        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            overflow-x: hidden;
            color: var(--ink);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1f1b;
        }

        button, input { font: inherit; }
        button { cursor: pointer; border: none; outline: none; }

        .shell {
            position: relative;
            width: 100%;
            max-width: 520px;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--paper);
            box-shadow: var(--shadow);
            border-radius: 0;
        }

        @media (min-width: 600px) {
            .shell {
                border-radius: 32px 12px 32px 12px;
                min-height: min(920px, 100dvh);
                max-height: 98dvh;
                margin: 8px auto;
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            }
        }

        /* ─── STAGE ─── */
        .stage {
            position: relative;
            flex: 0 0 auto;
            min-height: 460px;
            padding: clamp(20px, 4vw, 36px) clamp(16px, 3vw, 28px);
            overflow: hidden;
            color: var(--white);
            background: linear-gradient(180deg, rgba(13, 38, 34, 0.15), rgba(13, 38, 34, 0.70)), var(--green);
            border-bottom: 4px solid var(--gold);
        }

        .stage-mark {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stage-mark h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f5cf70;
            text-transform: uppercase;
        }

        .rec-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 99px;
            background: rgba(0, 0, 0, 0.45);
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .rec-indicator .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .rec-indicator.active .dot {
            background: var(--record-red);
            animation: pulse-rec 1s infinite;
        }

        @keyframes pulse-rec { 50% { opacity: 0.4; } }

        /* PORTRAIT & MOUTH */
        .portrait-wrap {
            position: relative;
            width: clamp(220px, 60vw, 320px);
            margin: 10px auto 0;
            transform-origin: 50% 80%;
            border-radius: 16px;
        }

        .portrait-wrap img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            object-fit: cover;
            aspect-ratio: 380 / 470;
        }

        .mouth-overlay {
            --lip-x: 0px;
            --lip-y: 0px;
            --lip-scale: 1;
            position: absolute;
            left: calc(50% + var(--lip-x));
            bottom: calc(18% + 38px + var(--lip-y));
            width: calc(28% * var(--lip-scale));
            height: calc(9% * var(--lip-scale));
            transform: translateX(-50%);
            z-index: 3;
        }

        .mouth-overlay svg { width: 100%; height: 100%; }
        #mouthOpenOverlay { opacity: 0; transform-origin: center; }
        #mouthClosedOverlay { opacity: 1; transform-origin: center; }

        /* BREAKING NEWS TICKER */
        .news-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--red);
            color: #fff;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            overflow: hidden;
            border-top: 2px solid var(--gold);
        }

        .ticker-title {
            background: var(--gold);
            color: #000;
            padding: 4px 10px;
            white-space: nowrap;
            z-index: 2;
        }

        .ticker-text {
            white-space: nowrap;
            padding-left: 100%;
            display: inline-block;
            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* ─── PANEL ─── */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            background: var(--paper);
            overflow-y: auto;
            gap: 12px;
        }

        .controls-box {
            padding: 12px;
            border: 1px solid rgba(23, 51, 47, 0.1);
            border-radius: 12px;
            background: rgba(255, 253, 247, 0.7);
        }

        .slider-group { display: flex; gap: 8px; margin-top: 8px; }
        .slider-item { flex: 1; font-size: 0.65rem; }
        .slider-item input { width: 100%; }

        .rec-controls { display: flex; align-items: center; justify-content: space-between; }
        .rec-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
            background: var(--red);
        }

        .rec-btn.recording { background: var(--record-red); animation: pulse-rec 1s infinite; }
        .upload-zone { border: 1.5px dashed #9a8d79; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; }
        .player { display: none; margin-top: 8px; }
        .player.is-visible { display: block; }
    </style>
</head>

<body>

    <main class="shell">

        <!-- ─── STAGE AREA (NEWS FRAME) ─── -->
        <section class="stage" id="stageArea">
            <header class="stage-mark">
                <h1>📰 तामीर अली विस्फोटक न्यूज़</h1>
                <div class="rec-indicator" id="recIndicator">
                    <span class="dot"></span>
                    <span id="recIndicatorLabel">IDLE</span>
                </div>
            </header>

            <div class="portrait-wrap" id="portraitWrap">
                <img id="faceImage" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 380 470'%3E%3Crect width='380' height='470' fill='%231b2a26'/%3E%3Ccircle cx='190' cy='180' r='70' fill='%233a5a52'/%3E%3Ctext x='190' y='310' font-family='system-ui' font-size='24' fill='%239aa8a2' text-anchor='middle'%3EUpload Face%3C/text%3E%3C/svg%3E" alt="Face" />
                
                <div class="mouth-overlay" id="mouthOverlay">
                    <svg viewBox="0 0 120 60">
                        <path id="mouthClosedOverlay" d="M10 32 Q60 28 110 32 M12 32 Q60 35 108 32" fill="none" stroke="#803328" stroke-width="6" stroke-linecap="round" />
                        <g id="mouthOpenOverlay">
                            <ellipse cx="60" cy="36" rx="46" ry="20" fill="#42130e" />
                            <path d="M22 28 Q60 30 98 28 Q60 24 22 28Z" fill="#ffffff" />
                            <path d="M28 44 Q60 38 92 44 Q60 50 28 44Z" fill="#c95b53" />
                        </g>
                    </svg>
                </div>
            </div>

            <!-- NEWS TICKER -->
            <div class="news-ticker">
                <div class="ticker-title">BREAKING NEWS</div>
                <div class="ticker-text">तामीर अली विस्फोटक न्यूज़ पोर्टल में आपका स्वागत है... ताज़ा अपडेट्स के लिए बने रहें...</div>
            </div>
        </section>

        <!-- ─── CONTROLS PANEL ─── -->
        <section class="panel">

            <!-- FACE UPLOAD -->
            <label class="upload-zone">
                📸 चेहरा बदलें (JPEG, PNG)
                <input type="file" id="faceInput" accept="image/*" hidden />
            </label>

            <!-- LIP CONTROLS -->
            <div class="controls-box">
                <b>🎯 होठों की स्थिति एडजस्ट करें</b>
                <div class="slider-group">
                    <div class="slider-item">L/R <input type="range" id="lipX" min="-50" max="50" value="0" /></div>
                    <div class="slider-item">U/D <input type="range" id="lipY" min="-50" max="50" value="0" /></div>
                    <div class="slider-item">Size <input type="range" id="lipScale" min="50" max="150" value="100" /></div>
                </div>
            </div>

            <!-- RECORDING -->
            <div class="controls-box rec-controls">
                <span>🎬 न्यूज़ रिकॉर्डर (विथ ऑडियो)</span>
                <button class="rec-btn" id="recBtn">Start Record</button>
            </div>

            <!-- AUDIO UPLOAD -->
            <label class="upload-zone">
                🎵 ऑडियो फाइल चुनें (MP3, WAV)
                <input type="file" id="audioInput" accept="audio/*" hidden />
            </label>

            <!-- PLAYER -->
            <div class="player" id="player">
                <button id="playPauseButton" class="rec-btn" style="background:var(--green); width:100%;">Play Audio</button>
            </div>

        </section>

    </main>

    <script>
        (function() {
            'use strict';

            const faceInput = document.getElementById('faceInput');
            const faceImage = document.getElementById('faceImage');
            const audioInput = document.getElementById('audioInput');
            const mouthOverlay = document.getElementById('mouthOverlay');
            const mouthOpen = document.getElementById('mouthOpenOverlay');
            const mouthClosed = document.getElementById('mouthClosedOverlay');
            const portraitWrap = document.getElementById('portraitWrap');
            const stageArea = document.getElementById('stageArea');
            
            const lipX = document.getElementById('lipX');
            const lipY = document.getElementById('lipY');
            const lipScale = document.getElementById('lipScale');
            const recBtn = document.getElementById('recBtn');
            const recIndicator = document.getElementById('recIndicator');
            const recIndicatorLabel = document.getElementById('recIndicatorLabel');
            const playPauseButton = document.getElementById('playPauseButton');
            const player = document.getElementById('player');

            let audioContext, audioBuffer, sourceNode, analyserNode, audioDestinationNode;
            let isPlaying = false, isRecording = false;
            let mediaRecorder, recordedChunks = [], animFrame;

            // Lip position adjustment
            function updateLips() {
                mouthOverlay.style.setProperty('--lip-x', lipX.value + 'px');
                mouthOverlay.style.setProperty('--lip-y', lipY.value + 'px');
                mouthOverlay.style.setProperty('--lip-scale', lipScale.value / 100);
            }
            [lipX, lipY, lipScale].forEach(el => el.addEventListener('input', updateLips));

            // Load Face
            faceInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => faceImage.src = ev.target.result;
                    reader.readAsDataURL(file);
                }
            });

            // Load Audio
            audioInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const arrayBuffer = await file.arrayBuffer();
                    audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    player.classList.add('is-visible');
                }
            });

            // Lip sync animation loop
            function animateFace() {
                if (!isPlaying || !analyserNode) return;
                const samples = new Uint8Array(analyserNode.fftSize);
                analyserNode.getByteTimeDomainData(samples);

                let energy = 0;
                for (const s of samples) {
                    const norm = (s - 128) / 128;
                    energy += norm * norm;
                }
                const rms = Math.sqrt(energy / samples.length);
                const open = Math.min(1, Math.max(0, (rms - 0.01) * 8));

                mouthOpen.style.opacity = open;
                mouthClosed.style.opacity = 1 - open;
                portraitWrap.style.transform = `scale(${1 + open * 0.02})`;

                animFrame = requestAnimationFrame(animateFace);
            }

            // Play / Pause Audio
            playPauseButton.addEventListener('click', () => {
                if (isPlaying) {
                    sourceNode?.stop();
                    isPlaying = false;
                    playPauseButton.textContent = "Play Audio";
                    mouthOpen.style.opacity = 0;
                    mouthClosed.style.opacity = 1;
                    cancelAnimationFrame(animFrame);
                } else if (audioBuffer) {
                    if (audioContext.state === 'suspended') audioContext.resume();
                    sourceNode = audioContext.createBufferSource();
                    analyserNode = audioContext.createAnalyser();
                    audioDestinationNode = audioContext.createMediaStreamDestination();

                    sourceNode.buffer = audioBuffer;
                    analyserNode.fftSize = 256;

                    sourceNode.connect(analyserNode);
                    sourceNode.connect(audioContext.destination);
                    sourceNode.connect(audioDestinationNode); // Record sound

                    sourceNode.start(0);
                    isPlaying = true;
                    playPauseButton.textContent = "Pause Audio";
                    animateFace();

                    sourceNode.onended = () => {
                        isPlaying = false;
                        playPauseButton.textContent = "Play Audio";
                        mouthOpen.style.opacity = 0;
                        mouthClosed.style.opacity = 1;
                    };
                }
            });

            // Enhanced Screen + Audio Recording
            recBtn.addEventListener('click', async () => {
                if (!isRecording) {
                    try {
                        const displayStream = await navigator.mediaDevices.getDisplayMedia({
                            video: { displaySurface: 'browser' },
                            audio: false
                        });

                        const videoTrack = displayStream.getVideoTracks()[0];
                        
                        // Audio Stream Combine
                        let tracks = [videoTrack];
                        if (audioDestinationNode && audioDestinationNode.stream.getAudioTracks().length > 0) {
                            tracks.push(audioDestinationNode.stream.getAudioTracks()[0]);
                        }

                        const combinedStream = new MediaStream(tracks);
                        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
                        recordedChunks = [];

                        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(recordedChunks, { type: 'video/webm' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `VisfotNews_${Date.now()}.webm`;
                            a.click();
                        };

                        mediaRecorder.start();
                        isRecording = true;
                        recBtn.textContent = "Stop Record";
                        recBtn.classList.add('recording');
                        recIndicator.classList.add('active');
                        recIndicatorLabel.textContent = "REC";

                        videoTrack.onended = () => stopRec();

                    } catch (err) {
                        alert("रिकॉर्डिंग शुरू करने में विफलता: " + err.message);
                    }
                } else {
                    stopRec();
                }
            });

            function stopRec() {
                if (mediaRecorder && isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    recBtn.textContent = "Start Record";
                    recBtn.classList.remove('recording');
                    recIndicator.classList.remove('active');
                    recIndicatorLabel.textContent = "IDLE";
                }
            }

        })();
    </script>
</body>
</html>
