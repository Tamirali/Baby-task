    ["Smash", "Choor-choor karna"], ["Shutter", "Parda / Shutter"], ["Bustle", "Halcahal"], ["Commotion", "Shor-sharaba"],
    ["Turmoil", "Khalbali"], ["Chaos", "Arajakata"], ["Confusion", "Bhram / Uljhan"], ["Disorder", "Avyavastha"],
    ["Mess", "Gadbadi"], ["Clutter", "Bikhra hua saman"], ["Jumble", "Mila-jula karna"], ["Hodgepodge", "Kichdi / Mishran"]
];

// Automatically remove duplicate words (by lowercased English key)
const uniqueWordsMap = new Map();
rawWordsList.forEach(item => {
    const key = item[0].toLowerCase().trim();
    if (!uniqueWordsMap.has(key)) {
        uniqueWordsMap.set(key, item);
    }
});

const wordsList = Array.from(uniqueWordsMap.values());

// =====================================================================
//  BUILD TABLE
// =====================================================================
function populateTable() {
    const tbody = document.getElementById('wordsTable');
    tbody.innerHTML = '';
    wordsList.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${index + 1}</td>
            <td><strong>${item[0]}</strong></td>
            <td>${item[1]}</td>
            <td>
                <button class="btn-audio" onclick="speakWord('${item[0].replace(/'/g, "\\'")}')">
                    🔊 Suno
                </button>
            </td>
        `;
        tbody.appendChild(row);
    });
    document.getElementById('wordCount').textContent = wordsList.length;
}

// =====================================================================
//  TEXT-TO-SPEECH
// =====================================================================
function speakWord(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("⚠️ Aapke browser mein Audio Speech Support nahi hai.");
    }
}

// =====================================================================
//  SEARCH FILTER
// =====================================================================
function filterTable() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('#wordsTable tr');
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? '' : 'none';
    });
}

// ─── INIT ──────────────────────────────────────────────────────────────
populateTable();
</script>
