<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On & Photo Studio (Blender Style)</title>
    <style>
        /* ===== Blender-Style Dark Theme ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1a1a; color: #e0e0e0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { background: #2d2d2d; padding: 15px 30px; border-bottom: 2px solid #444; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 22px; background: linear-gradient(135deg, #ff6b6b, #ffa500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .api-settings { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .api-settings input { background: #333; border: 1px solid #555; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; width: 200px; }
        .api-settings button { background: #4CAF50; border: none; color: #fff; padding: 6px 15px; border-radius: 6px; cursor: pointer; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Panel - Upload & Canvas Editor */
        .left-panel { width: 70%; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .drop-zones { display: flex; gap: 15px; margin-bottom: 15px; }
        .drop-zone { flex: 1; border: 2px dashed #555; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; background: #252525; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #ff6b6b; background: #2a2a2a; }
        .drop-zone img { max-width: 100%; max-height: 120px; border-radius: 8px; margin-top: 10px; }
        .drop-zone p { color: #888; margin-top: 5px; font-size: 14px; }
        
        .canvas-wrapper { flex: 1; background: #121212; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #editorCanvas { max-width: 100%; max-height: 100%; }
        
        .editor-tools { display: flex; gap: 15px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
        .editor-tools label { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .editor-tools input[type="range"] { width: 100px; accent-color: #ff6b6b; }
        .editor-tools button { background: #444; border: none; color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .editor-tools button:hover { background: #666; }
        .editor-tools .btn-primary { background: #ff6b6b; }
        .editor-tools .btn-primary:hover { background: #ff5252; }
        
        /* Right Panel - Output & Controls */
        .right-panel { width: 30%; padding: 20px; display: flex; flex-direction: column; }
        .right-panel h3 { color: #888; margin-bottom: 10px; font-weight: 400; }
        .output-box { flex: 1; background: #121212; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #outputImage { max-width: 100%; max-height: 100%; object-fit: contain; }
        .output-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .output-actions button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #downloadBtn { background: #2196F3; color: #fff; }
        #downloadBtn:hover { background: #1976D2; }
        #clearBtn { background: #f44336; color: #fff; }
        
        #status { margin-top: 10px; color: #ffa500; font-size: 14px; text-align: center; }
        
        /* Responsive */
        @media (max-width: 800px) { .main-container { flex-direction: column; } .left-panel { width: 100%; border-right: none; } .right-panel { width: 100%; height: 300px; } }
    </style>
</head>
<body>

    <header>
        <h1>🎨 AI Photo Studio & Try-On</h1>
        <div class="api-settings">
            <input type="text" id="replicateKey" placeholder="Replicate API Token" value="">
            <input type="text" id="imgbbKey" placeholder="ImgBB API Key" value="">
            <button onclick="saveKeys()">Save Keys</button>
        </div>
    </header>

    <div class="main-container">
        <!-- LEFT PANEL: Upload + Editor -->
        <div class="left-panel">
            <div class="drop-zones">
                <div class="drop-zone" id="modelDrop" onclick="document.getElementById('modelInput').click()">
                    <p>📸 मॉडल अपलोड करें</p>
                    <img id="modelPreview" style="display:none;">
                    <input type="file" id="modelInput" accept="image/*" style="display:none">
                </div>
                <div class="drop-zone" id="garmentDrop" onclick="document.getElementById('garmentInput').click()">
                    <p>👕 कपड़ा अपलोड करें</p>
                    <img id="garmentPreview" style="display:none;">
                    <input type="file" id="garmentInput" accept="image/*" style="display:none">
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="editorCanvas"></canvas>
            </div>

            <div class="editor-tools">
                <label>चमक <input type="range" id="brightness" min="-100" max="100" value="0" oninput="applyFilters()"></label>
                <label>कंट्रास्ट <input type="range" id="contrast" min="-100" max="100" value="0" oninput="applyFilters()"></label>
                <label>सैचुरेशन <input type="range" id="saturation" min="-100" max="100" value="0" oninput="applyFilters()"></label>
                <button onclick="rotateImage(90)">↻ रोटेट</button>
                <button onclick="flipImage('h')">⇆ फ्लिप</button>
                <button onclick="resetFilters()">↺ रीसेट</button>
                <button class="btn-primary" onclick="runAITryOn()">🤖 AI ट्राई-ऑन</button>
            </div>
        </div>

        <!-- RIGHT PANEL: Output -->
        <div class="right-panel">
            <h3>✨ आउटपुट प्रीव्यू</h3>
            <div class="output-box">
                <img id="outputImage" src="" alt="AI Result यहाँ आएगा">
            </div>
            <div class="output-actions">
                <button id="downloadBtn" onclick="downloadResult()">📥 डाउनलोड करें</button>
                <button id="clearBtn" onclick="clearAll()">🗑️ साफ करें</button>
            </div>
            <div id="status">✔️ मॉडल और कपड़ा अपलोड करें, फिर AI बटन दबाएँ</div>
        </div>
    </div>

    <script>
        // =============================================
        // 1. GLOBAL VARIABLES
        // =============================================
        let modelImage = null;  // Blob/File
        let garmentImage = null;
        let canvas = document.getElementById('editorCanvas');
        let ctx = canvas.getContext('2d');
        let originalImageData = null; // मूल इमेज डेटा (फिल्टर रीसेट के लिए)
        let currentImage = new Image();
        
        // API Keys
        let REPLICATE_TOKEN = localStorage.getItem('replicate_token') || '';
        let IMGBB_KEY = localStorage.getItem('imgbb_key') || '';
        document.getElementById('replicateKey').value = REPLICATE_TOKEN;
        document.getElementById('imgbbKey').value = IMGBB_KEY;

        // =============================================
        // 2. UPLOAD HANDLERS (Drag & Drop + Click)
        // =============================================
        ['modelDrop', 'garmentDrop'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
            el.addEventListener('dragleave', e => { el.classList.remove('dragover'); });
            el.addEventListener('drop', e => {
                e.preventDefault();
                el.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file, id);
            });
        });

        document.getElementById('modelInput').addEventListener('change', e => handleFile(e.target.files[0], 'modelDrop'));
        document.getElementById('garmentInput').addEventListener('change', e => handleFile(e.target.files[0], 'garmentDrop'));

        function handleFile(file, dropZoneId) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    if (dropZoneId === 'modelDrop') {
                        modelImage = file;
                        document.getElementById('modelPreview').src = e.target.result;
                        document.getElementById('modelPreview').style.display = 'block';
                        // मुख्य कैनवास पर मॉडल सेट करें
                        loadToCanvas(img);
                    } else {
                        garmentImage = file;
                        document.getElementById('garmentPreview').src = e.target.result;
                        document.getElementById('garmentPreview').style.display = 'block';
                    }
                    document.getElementById('status').innerHTML = '✅ इमेज अपलोड हो गई! अब AI ट्राई-ऑन करें।';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function loadToCanvas(img) {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            currentImage = img;
        }

        // =============================================
        // 3. PHOTO EDITOR (Blender-style Filters)
        // =============================================
        function applyFilters() {
            if (!originalImageData) return;
            let brightness = parseInt(document.getElementById('brightness').value);
            let contrast = parseInt(document.getElementById('contrast').value);
            let saturation = parseInt(document.getElementById('saturation').value);

            let imageData = new ImageData(new Uint8ClampedArray(originalImageData.data), originalImageData.width, originalImageData.height);
            let data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                // Brightness
                data[i] = clamp(data[i] + brightness);
                data[i+1] = clamp(data[i+1] + brightness);
                data[i+2] = clamp(data[i+2] + brightness);
                
                // Contrast (factor)
                let factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                data[i] = clamp(factor * (data[i] - 128) + 128);
                data[i+1] = clamp(factor * (data[i+1] - 128) + 128);
                data[i+2] = clamp(factor * (data[i+2] - 128) + 128);

                // Saturation
                let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                let satFactor = 1 + (saturation / 100);
                data[i] = clamp(gray + (data[i] - gray) * satFactor);
                data[i+1] = clamp(gray + (data[i+1] - gray) * satFactor);
                data[i+2] = clamp(gray + (data[i+2] - gray) * satFactor);
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function clamp(val) { return Math.min(255, Math.max(0, Math.round(val))); }

        function resetFilters() {
            document.getElementById('brightness').value = 0;
            document.getElementById('contrast').value = 0;
            document.getElementById('saturation').value = 0;
            if (originalImageData) ctx.putImageData(originalImageData, 0, 0);
        }

        function rotateImage(deg) {
            if (!currentImage.src) return;
            let tempCanvas = document.createElement('canvas');
            let tempCtx = tempCanvas.getContext('2d');
            if (deg === 90 || deg === -90) {
                tempCanvas.width = canvas.height;
                tempCanvas.height = canvas.width;
                tempCtx.translate(tempCanvas.width/2, tempCanvas.height/2);
                tempCtx.rotate(deg * Math.PI / 180);
                tempCtx.drawImage(canvas, -canvas.width/2, -canvas.height/2);
            }
            canvas.width = tempCanvas.width;
            canvas.height = tempCanvas.height;
            ctx.drawImage(tempCanvas, 0, 0);
            originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function flipImage(dir) {
            let tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            let tempCtx = tempCanvas.getContext('2d');
            if (dir === 'h') {
                tempCtx.translate(canvas.width, 0);
                tempCtx.scale(-1, 1);
            } else {
                tempCtx.translate(0, canvas.height);
                tempCtx.scale(1, -1);
            }
            tempCtx.drawImage(canvas, 0, 0);
            ctx.drawImage(tempCanvas, 0, 0);
            originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        // =============================================
        // 4. AI VIRTUAL TRY-ON (Replicate + ImgBB)
        // =============================================
        async function runAITryOn() {
            if (!modelImage || !garmentImage) {
                document.getElementById('status').innerHTML = '⚠️ कृपया मॉडल और कपड़ा दोनों अपलोड करें!';
                return;
            }
            if (!REPLICATE_TOKEN || !IMGBB_KEY) {
                document.getElementById('status').innerHTML = '⚠️ कृपया ऊपर API Keys (Replicate & ImgBB) डालें और Save करें!';
                return;
            }

            document.getElementById('status').innerHTML = '⏳ इमेजेस अपलोड हो रही हैं... (ImgBB)';
            try {
                const modelUrl = await uploadToImgBB(modelImage);
                const garmentUrl = await uploadToImgBB(garmentImage);
                document.getElementById('status').innerHTML = '⏳ AI मॉडल (IDM-VTON) प्रोसेस कर रहा है... 10-15 सेकंड लगेंगे';

                // Replicate API Call
                const response = await fetch('https://api.replicate.com/v1/predictions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Token ${REPLICATE_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "yisol/idm-vton:4a0d9b4a6c4d4c8f9f9f5b1c1d1e1f1g1h1i1j1k1l1m1n1o1p1q1r1s1t1u1v1w1x1y1z", // Replace with actual IDM-VTON model ID
                        input: {
                            human_image: modelUrl,
                            garment_image: garmentUrl
                        }
                    })
                });

                if (!response.ok) throw new Error('Replicate API Error');
                const json = await response.json();
                const predictionId = json.id;

                // Polling for result
                let resultUrl = null;
                for (let i = 0; i < 20; i++) {
                    await new Promise(r => setTimeout(r, 3000));
                    const statusRes = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
                        headers: { 'Authorization': `Token ${REPLICATE_TOKEN}` }
                    });
                    const statusJson = await statusRes.json();
                    if (statusJson.status === 'succeeded') {
                        resultUrl = statusJson.output[0];
                        break;
                    } else if (statusJson.status === 'failed') {
                        throw new Error('AI मॉडल फेल हो गया।');
                    }
                }

                if (resultUrl) {
                    document.getElementById('outputImage').src = resultUrl;
                    document.getElementById('status').innerHTML = '✅ AI ट्राई-ऑन सफल! अब डाउनलोड करें।';
                } else {
                    throw new Error('समय समाप्त, पुनः प्रयास करें।');
                }

            } catch (err) {
                document.getElementById('status').innerHTML = '❌ एरर: ' + err.message;
            }
        }

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            });
            const json = await response.json();
            if (!json.success) throw new Error('ImgBB अपलोड फेल: ' + json.error.message);
            return json.data.url;
        }

        // =============================================
        // 5. SAVE KEYS & UTILITIES
        // =============================================
        function saveKeys() {
            REPLICATE_TOKEN = document.getElementById('replicateKey').value.trim();
            IMGBB_KEY = document.getElementById('imgbbKey').value.trim();
            localStorage.setItem('replicate_token', REPLICATE_TOKEN);
            localStorage.setItem('imgbb_key', IMGBB_KEY);
            document.getElementById('status').innerHTML = '🔑 API Keys सेव हो गईं!';
        }

        function downloadResult() {
            const img = document.getElementById('outputImage');
            if (!img.src || img.src === '') {
                document.getElementById('status').innerHTML = '⚠️ डाउनलोड करने के लिए पहले AI रिजल्ट जनरेट करें।';
                return;
            }
            const link = document.createElement('a');
            link.download = 'ai_tryon_result.png';
            link.href = img.src;
            link.click();
        }

        function clearAll() {
            document.getElementById('outputImage').src = '';
            document.getElementById('modelPreview').src = ''; document.getElementById('modelPreview').style.display = 'none';
            document.getElementById('garmentPreview').src = ''; document.getElementById('garmentPreview').style.display = 'none';
            document.getElementById('modelInput').value = '';
            document.getElementById('garmentInput').value = '';
            modelImage = null; garmentImage = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            originalImageData = null;
            document.getElementById('status').innerHTML = '🗑️ सब कुछ साफ हो गया। नया अपलोड करें।';
        }

        // Load saved keys on start
        if (REPLICATE_TOKEN) document.getElementById('status').innerHTML = '🔑 Keys loaded. Upload images to start.';
    </script>
</body>
</html>
