<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WhatsApp कनेक्ट – संपर्क, वॉइस, लोकेशन</title>
    <!-- Tailwind + FontAwesome -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Leaflet.js for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <style>
        * { scroll-behavior: smooth; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; padding-bottom: 80px; }
        .whatsapp-green { background: #25D366; }
        .whatsapp-green:hover { background: #1da851; }
        .contact-card {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid #25D366;
        }
        .contact-card:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(37,211,102,0.15); }
        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #25D366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .map-container {
            height: 320px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #e5e7eb;
            position: relative;
        }
        .mic-btn.recording {
            background: #ef4444 !important;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .tab-btn {
            padding: 10px 12px;
            border-radius: 12px 12px 0 0;
            font-weight: 600;
            font-size: 13px;
            border: none;
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #25D366;
            border-bottom-color: #25D366;
            background: #f0fdf4;
        }
        .tab-content { display: none; padding-top: 16px; }
        .tab-content.active { display: block; }
        .floating-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 6px 24px rgba(37,211,102,0.4);
            border: none;
            cursor: pointer;
            transition: 0.2s;
            z-index: 100;
        }
        .floating-btn:hover { transform: scale(1.05); }
        .location-marker-user {
            background: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            width: 18px; height: 18px;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
        }
        .location-marker-contact {
            background: #ef4444;
            border: 3px solid white;
            border-radius: 50%;
            width: 18px; height: 18px;
            box-shadow: 0 0 0 4px rgba(239,68,68,0.3);
        }
        .contact-list-container { max-height: 400px; overflow-y: auto; }
        .contact-list-container::-webkit-scrollbar { width: 4px; }
        .contact-list-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        input, textarea { font-size: 16px !important; } /* prevent iOS zoom */
        @media (max-width: 480px) {
            .contact-card { padding: 10px 12px; }
            .avatar { width: 36px; height: 36px; font-size: 15px; }
            .floating-btn { width: 54px; height: 54px; font-size: 24px; bottom: 16px; right: 16px; }
        }
        .chat-preview {
            max-height: 120px;
            overflow-y: auto;
            background: #f9fafb;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            border: 1px solid #e5e7eb;
        }
        .chat-preview::-webkit-scrollbar { width: 4px; }
        .chat-preview::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .translation-badge {
            background: #fef3c7;
            color: #92400e;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid #f59e0b;
        }
        .leaflet-control-attribution { font-size: 8px !important; }
        #map .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="max-w-2xl mx-auto px-3 py-4">

        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-brands fa-whatsapp text-[#25D366]"></i>
                    <span>WhatsApp कनेक्ट</span>
                </h1>
                <p class="text-xs text-gray-500">📱 संपर्क · वॉइस · लोकेशन · शेयर</p>
            </div>
            <button onclick="refreshAll()" class="text-gray-400 hover:text-gray-600 text-sm">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>

        <!-- Tabs -->
        <div class="flex bg-white rounded-t-2xl shadow-sm border-b border-gray-200 overflow-hidden">
            <button class="tab-btn active" data-tab="contacts" onclick="switchTab('contacts')">
                <i class="fa-solid fa-address-book mr-1.5"></i> संपर्क
            </button>
            <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">
                <i class="fa-regular fa-comment mr-1.5"></i> चैट
            </button>
            <button class="tab-btn" data-tab="location" onclick="switchTab('location')">
                <i class="fa-solid fa-location-dot mr-1.5"></i> लोकेशन
            </button>
        </div>

        <!-- Tab: Contacts -->
        <div id="tab-contacts" class="tab-content active bg-white rounded-b-2xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-medium text-gray-600">
                    <i class="fa-regular fa-circle-check text-green-500 mr-1"></i>
                    <span id="contact-count">0</span> संपर्क
                </span>
                <button onclick="showAddContact()" class="text-sm text-green-600 font-semibold hover:text-green-700">
                    <i class="fa-regular fa-plus mr-1"></i> नया जोड़ें
                </button>
            </div>
            <div id="contact-list" class="contact-list-container space-y-2">
                <!-- JS fills -->
            </div>
            <div id="empty-contacts" class="text-center py-8 text-gray-400 hidden">
                <i class="fa-regular fa-address-book text-4xl block mb-2 opacity-30"></i>
                <p class="text-sm">कोई संपर्क नहीं</p>
                <p class="text-xs">"नया जोड़ें" से शुरू करें</p>
            </div>
        </div>

        <!-- Tab: Chat -->
        <div id="tab-chat" class="tab-content bg-white rounded-b-2xl shadow-sm p-4">
            <div class="mb-3">
                <label class="text-sm font-medium text-gray-700 block mb-1.5">
                    <i class="fa-regular fa-user mr-1"></i> संपर्क चुनें
                </label>
                <select id="chat-contact-select" class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white">
                    <option value="">-- कोई संपर्क चुनें --</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="text-sm font-medium text-gray-700 block mb-1.5">
                    <i class="fa-regular fa-message mr-1"></i> संदेश
                </label>
                <textarea id="message-input" rows="3" placeholder="हिंदी में लिखें या माइक से बोलें..." class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 resize-none"></textarea>
            </div>

            <!-- Translation box -->
            <div id="translation-box" class="bg-gray-50 rounded-xl p-3 mb-3 border border-gray-200 hidden">
                <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
                    <i class="fa-solid fa-language text-amber-500"></i>
                    <span>अंग्रेज़ी अनुवाद</span>
                    <span class="translation-badge">auto</span>
                </div>
                <p id="translated-text" class="text-sm text-gray-700 font-medium">—</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <button onclick="sendMessage()" class="whatsapp-green text-white px-5 py-2.5 rounded-xl font-semibold text-sm flex-1 flex items-center justify-center gap-2 shadow transition">
                    <i class="fa-brands fa-whatsapp"></i> भेजें
                </button>
                <button id="mic-btn" onclick="toggleVoice()" class="mic-btn bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 transition">
                    <i class="fa-solid fa-microphone"></i> बोलें
                </button>
            </div>

            <div class="mt-4 pt-3 border-t border-gray-200">
                <p class="text-xs text-gray-400 mb-2 flex items-center gap-1">
                    <i class="fa-regular fa-clock"></i> हाल के संदेश
                </p>
                <div id="chat-preview" class="chat-preview text-gray-500 text-xs">
                    <p class="text-center text-gray-400">कोई संदेश नहीं</p>
                </div>
            </div>
        </div>

        <!-- Tab: Location -->
        <div id="tab-location" class="tab-content bg-white rounded-b-2xl shadow-sm p-4">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div class="bg-blue-50 rounded-xl p-3 text-center border border-blue-100">
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">आपकी लोकेशन</p>
                    <p id="user-location-text" class="text-xs font-mono text-blue-700 truncate">⏳ लोड हो रहा...</p>
                    <button onclick="getUserLocation()" class="mt-1 text-xs text-blue-600 font-semibold hover:underline">ताज़ा करें</button>
                </div>
                <div class="bg-red-50 rounded-xl p-3 text-center border border-red-100">
                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">संपर्क की लोकेशन</p>
                    <p id="contact-location-text" class="text-xs font-mono text-red-700 truncate">⏳ सेट करें</p>
                    <button onclick="setContactLocation()" class="mt-1 text-xs text-red-600 font-semibold hover:underline">सेट करें</button>
                </div>
            </div>

            <!-- Map -->
            <div class="map-container">
                <div id="map" style="height:100%; width:100%;"></div>
                <div id="map-loading" class="absolute inset-0 flex items-center justify-center bg-white/80 text-gray-400 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i> मानचित्र लोड हो रहा...
                </div>
            </div>

            <!-- Location action buttons -->
            <div class="flex flex-wrap gap-2 mt-3">
                <button onclick="copyLocationLink()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2">
                    <i class="fa-regular fa-copy"></i> लिंक कॉपी करें
                </button>
                <button onclick="shareLocation()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-share-nodes"></i> शेयर करें
                </button>
            </div>

            <p id="location-status" class="text-center text-xs text-gray-400 mt-2">
                <i class="fa-regular fa-circle-info"></i> लोकेशन ताज़ा करें और लिंक कॉपी/शेयर करें
            </p>
        </div>

    </div>

    <!-- Floating add button -->
    <button onclick="showAddContact()" class="floating-btn" title="नया संपर्क">
        <i class="fa-regular fa-plus"></i>
    </button>

    <!-- Add Contact Modal -->
    <div id="add-contact-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4" onclick="if(event.target===this) closeAddContact()">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800">
                    <i class="fa-regular fa-address-card text-green-500 mr-2"></i>नया संपर्क
                </h3>
                <button onclick="closeAddContact()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <form onsubmit="addContact(event)" class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">नाम *</label>
                    <input id="new-name" type="text" placeholder="जैसे: राहुल" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">WhatsApp नंबर *</label>
                    <input id="new-phone" type="tel" placeholder="91 के साथ, जैसे 919876543210" required class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">लोकेशन (वैकल्पिक)</label>
                    <div class="flex gap-2">
                        <input id="new-lat" type="text" placeholder="Lat" class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
                        <input id="new-lon" type="text" placeholder="Lon" class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
                    </div>
                    <button type="button" onclick="useCurrentLocationForContact()" class="mt-1 text-xs text-blue-600 hover:underline">📍 मेरी वर्तमान लोकेशन उपयोग करें</button>
                </div>
                <button type="submit" class="w-full whatsapp-green text-white py-3 rounded-xl font-semibold text-sm shadow transition">
                    <i class="fa-regular fa-plus mr-1"></i> संपर्क जोड़ें
                </button>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ==================== सारा JavaScript ====================== -->
    <!-- ============================================================ -->
    <script>
        // ================================================================
        // 1. Data & State
        // ================================================================
        let contacts = [];
        let chatHistory = [];
        let map = null;
        let userMarker = null;
        let contactMarker = null;
        let userLat = null, userLon = null;
        let isRecording = false;
        let recognition = null;
        let mapInitialized = false;

        // ================================================================
        // 2. Storage
        // ================================================================
        function loadData() {
            try {
                const c = localStorage.getItem('wa_contacts');
                if (c) contacts = JSON.parse(c);
                const h = localStorage.getItem('wa_chat_history');
                if (h) chatHistory = JSON.parse(h);
            } catch(e) { console.warn('Load error', e); }
            if (contacts.length === 0) {
                contacts = [
                    { id: 'demo1', name: 'राहुल शर्मा', phone: '919876543210', lat: '28.6139', lon: '77.2090' },
                    { id: 'demo2', name: 'प्रिया सिंह', phone: '919876543211', lat: '28.7041', lon: '77.1025' },
                    { id: 'demo3', name: 'अमित कुमार', phone: '919876543212', lat: '28.5355', lon: '77.3910' }
                ];
                saveData();
            }
            if (chatHistory.length === 0) {
                chatHistory = [
                    { id: 'm1', contactId: 'demo1', text: 'नमस्ते राहुल, कैसे हो?', translated: 'Hello Rahul, how are you?', time: Date.now()-3600000, fromMe: true },
                    { id: 'm2', contactId: 'demo1', text: 'मैं ठीक हूँ, आप सुनाओ?', translated: 'I am fine, how about you?', time: Date.now()-3000000, fromMe: false }
                ];
                saveData();
            }
        }

        function saveData() {
            try {
                localStorage.setItem('wa_contacts', JSON.stringify(contacts));
                localStorage.setItem('wa_chat_history', JSON.stringify(chatHistory));
            } catch(e) { console.warn('Save error', e); }
        }

        // ================================================================
        // 3. Contacts Render
        // ================================================================
        function renderContacts() {
            const list = document.getElementById('contact-list');
            const empty = document.getElementById('empty-contacts');
            const count = document.getElementById('contact-count');
            if (!list) return;
            list.innerHTML = '';
            if (contacts.length === 0) {
                empty?.classList.remove('hidden');
                if (count) count.innerText = '0';
                return;
            }
            empty?.classList.add('hidden');
            if (count) count.innerText = contacts.length;
            contacts.forEach(c => {
                const div = document.createElement('div');
                div.className = 'contact-card';
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0" onclick="selectContact('${c.id}')">
                        <div class="avatar">${c.name.charAt(0).toUpperCase()}</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-gray-800 text-sm truncate">${c.name}</p>
                            <p class="text-xs text-gray-400 truncate">${c.phone}</p>
                            ${c.lat && c.lon ? `<p class="text-[10px] text-gray-400">📍 ${c.lat}, ${c.lon}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-1.5 flex-shrink-0">
                        <button onclick="event.stopPropagation(); chatWithContact('${c.id}')" class="text-green-500 hover:text-green-600 p-1.5 text-sm" title="चैट करें">
                            <i class="fa-brands fa-whatsapp"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteContact('${c.id}')" class="text-gray-300 hover:text-red-500 p-1.5 text-sm" title="हटाएँ">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            updateChatSelect();
        }

        function updateChatSelect() {
            const sel = document.getElementById('chat-contact-select');
            if (!sel) return;
            const current = sel.value;
            sel.innerHTML = '<option value="">-- कोई संपर्क चुनें --</option>';
            contacts.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name + ' (' + c.phone + ')';
                sel.appendChild(opt);
            });
            if (current && contacts.some(c => c.id === current)) sel.value = current;
            else if (contacts.length > 0) sel.value = contacts[0].id;
            selectedContactId = sel.value || null;
            updateChatPreview();
            // Update contact location display
            updateContactLocationDisplay();
        }

        function selectContact(id) {
            const sel = document.getElementById('chat-contact-select');
            if (sel) { sel.value = id; }
            selectedContactId = id;
            updateChatPreview();
            switchTab('chat');
            showToast('✉️ ' + (contacts.find(c=>c.id===id)?.name || '') + ' से बात करें');
        }

        function chatWithContact(id) {
            const c = contacts.find(ct => ct.id === id);
            if (c) {
                window.open('https://wa.me/' + c.phone.replace(/[^0-9]/g,''), '_blank');
                showToast('📨 ' + c.name + ' के साथ WhatsApp खुल रहा...');
            }
        }

        function deleteContact(id) {
            if (!confirm('संपर्क हटाएँ?')) return;
            contacts = contacts.filter(c => c.id !== id);
            saveData();
            renderContacts();
            showToast('🗑️ संपर्क हटा दिया');
        }

        // ================================================================
        // 4. Add Contact
        // ================================================================
        function showAddContact() {
            document.getElementById('add-contact-modal').classList.remove('hidden');
            document.getElementById('new-name').focus();
        }

        function closeAddContact() {
            document.getElementById('add-contact-modal').classList.add('hidden');
            document.getElementById('new-name').value = '';
            document.getElementById('new-phone').value = '';
            document.getElementById('new-lat').value = '';
            document.getElementById('new-lon').value = '';
        }

        function addContact(e) {
            e.preventDefault();
            const name = document.getElementById('new-name').value.trim();
            const phone = document.getElementById('new-phone').value.trim();
            const lat = document.getElementById('new-lat').value.trim();
            const lon = document.getElementById('new-lon').value.trim();
            if (!name || !phone) { showToast('❌ नाम और नंबर भरें'); return; }
            if (phone.length < 10) { showToast('❌ नंबर कम से कम 10 अंक का हो'); return; }
            contacts.push({
                id: 'c' + Date.now(),
                name: name,
                phone: phone.replace(/[^0-9]/g,''),
                lat: lat || '',
                lon: lon || ''
            });
            saveData();
            renderContacts();
            closeAddContact();
            showToast('✅ ' + name + ' जुड़ गया!');
        }

        function useCurrentLocationForContact() {
            if (!navigator.geolocation) { showToast('❌ GPS सपोर्ट नहीं'); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('new-lat').value = pos.coords.latitude.toFixed(6);
                    document.getElementById('new-lon').value = pos.coords.longitude.toFixed(6);
                    showToast('📍 लोकेशन ले ली');
                },
                () => { showToast('❌ GPS अनुमति नहीं'); }
            );
        }

        // ================================================================
        // 5. Chat & Send
        // ================================================================
        async function sendMessage() {
            const sel = document.getElementById('chat-contact-select');
            const msg = document.getElementById('message-input');
            if (!sel || !msg) return;
            const id = sel.value;
            if (!id) { showToast('❌ पहले संपर्क चुनें'); return; }
            const text = msg.value.trim();
            if (!text) { showToast('❌ कुछ लिखें'); return; }
            const contact = contacts.find(c => c.id === id);
            if (!contact) { showToast('❌ संपर्क नहीं मिला'); return; }

            // Translate if Hindi
            let translated = text;
            if (/[अ-हा-ज]/.test(text)) {
                translated = await translateAsync(text);
            } else {
                translated = text;
            }

            // Save history
            chatHistory.push({
                id: 'm' + Date.now(),
                contactId: id,
                text: text,
                translated: translated,
                time: Date.now(),
                fromMe: true
            });
            saveData();
            updateChatPreview();

            // Open WhatsApp
            const url = 'https://wa.me/' + contact.phone.replace(/[^0-9]/g,'') + '?text=' + encodeURIComponent(text + (translated !== text ? '\n\n(Translated: ' + translated + ')' : ''));
            window.open(url, '_blank');
            msg.value = '';
            document.getElementById('translation-box')?.classList.add('hidden');
            showToast('📨 संदेश भेजा!');
        }

        // ================================================================
        // 6. Voice to Text (Hindi)
        // ================================================================
        function toggleVoice() {
            const btn = document.getElementById('mic-btn');
            if (isRecording) { stopVoice(); return; }
            startVoice();
        }

        function startVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) { showToast('❌ वॉइस सपोर्ट नहीं'); return; }
            recognition = new Speech();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            isRecording = true;
            const btn = document.getElementById('mic-btn');
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fa-solid fa-stop"></i> रोकें';
            showToast('🎤 बोलना शुरू करें...');

            recognition.onresult = function(e) {
                const text = e.results[0][0].transcript;
                const input = document.getElementById('message-input');
                if (input) {
                    input.value = text;
                    // Auto translate
                    if (/[अ-हा-ज]/.test(text)) {
                        translateAsync(text);
                    } else {
                        document.getElementById('translation-box')?.classList.add('hidden');
                    }
                }
                stopVoice();
                showToast('✅ बोल दिया!');
            };
            recognition.onerror = function(e) {
                stopVoice();
                if (e.error === 'not-allowed') showToast('❌ माइक अनुमति नहीं');
                else showToast('❌ वॉइस त्रुटि: ' + e.error);
            };
            recognition.start();
        }

        function stopVoice() {
            if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
            isRecording = false;
            const btn = document.getElementById('mic-btn');
            btn.classList.remove('recording');
            btn.innerHTML = '<i class="fa-solid fa-microphone"></i> बोलें';
        }

        // ================================================================
        // 7. Translation (Hindi → English) using Google Translate API
        // ================================================================
        async function translateAsync(text) {
            if (!text || !/[अ-हा-ज]/.test(text)) {
                document.getElementById('translation-box')?.classList.add('hidden');
                return text;
            }
            try {
                const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=hi&tl=en&dt=t&q=' + encodeURIComponent(text);
                const res = await fetch(url);
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                const translated = data[0][0][0] || text;
                showTranslation(translated);
                return translated;
            } catch(e) {
                console.warn('Translation fallback', e);
                // Fallback: simple dictionary
                const simple = simpleHindiToEnglish(text);
                showTranslation(simple);
                return simple;
            }
        }

        function simpleHindiToEnglish(text) {
            const dict = {
                'नमस्ते':'Hello','नमस्कार':'Hello','कैसे हो':'How are you','क्या हाल है':'How are you',
                'ठीक हूँ':'I am fine','धन्यवाद':'Thank you','शुक्रिया':'Thanks','मुझे':'I','आप':'You',
                'हम':'We','हाँ':'Yes','नहीं':'No','अच्छा':'Good','बुरा':'Bad','बहुत':'Very','क्या':'What',
                'क्यों':'Why','कहाँ':'Where','कब':'When','कौन':'Who','का':'of','को':'to','से':'from',
                'में':'in','पर':'on','और':'and','या':'or','लेकिन':'but','इसलिए':'therefore','क्योंकि':'because',
                'यह':'this','वह':'that','मैं':'I','तुम':'You','वे':'They','मेरा':'My','तेरा':'Your',
                'हमारा':'Our','उनका':'Their','आज':'Today','कल':'Tomorrow','परसों':'Day after tomorrow',
                'कल':'Tomorrow','बीता':'Past','भविष्य':'Future'
            };
            let result = text;
            for (const [hi, en] of Object.entries(dict)) {
                result = result.replace(new RegExp(hi, 'gi'), en);
            }
            return result === text ? text + ' [अनुवाद नहीं मिला]' : result;
        }

        function showTranslation(translated) {
            const box = document.getElementById('translation-box');
            const el = document.getElementById('translated-text');
            if (!box || !el) return;
            if (translated && translated.trim()) {
                box.classList.remove('hidden');
                el.textContent = translated;
            } else {
                box.classList.add('hidden');
            }
        }

        // ================================================================
        // 8. Chat Preview
        // ================================================================
        function updateChatPreview() {
            const container = document.getElementById('chat-preview');
            if (!container) return;
            const id = document.getElementById('chat-contact-select')?.value;
            if (!id) { container.innerHTML = '<p class="text-center text-gray-400">कोई संपर्क चुनें</p>'; return; }
            const msgs = chatHistory.filter(m => m.contactId === id).slice(-8);
            if (msgs.length === 0) { container.innerHTML = '<p class="text-center text-gray-400">अभी कोई संदेश नहीं</p>'; return; }
            container.innerHTML = msgs.map(m => `
                <div class="flex items-start gap-2 mb-1.5 ${m.fromMe ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[75%] ${m.fromMe ? 'bg-green-100' : 'bg-gray-100'} rounded-xl px-3 py-1.5 text-xs">
                        <p class="text-gray-800">${m.text}</p>
                        ${m.translated && m.translated !== m.text ? `<p class="text-[10px] text-gray-400 italic">📝 ${m.translated}</p>` : ''}
                        <p class="text-[9px] text-gray-400 mt-0.5">${new Date(m.time).toLocaleTimeString('hi-IN', {hour:'2-digit',minute:'2-digit'})}</p>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // ================================================================
        // 9. Map & Location
        // ================================================================
        function initMap() {
            if (mapInitialized) return;
            const container = document.getElementById('map');
            if (!container) return;
            try {
                map = L.map('map', { zoomControl: false, attributionControl: true }).setView([20.5937, 78.9629], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
                document.getElementById('map-loading').style.display = 'none';
                mapInitialized = true;
                getUserLocation();
            } catch(e) {
                document.getElementById('map-loading').innerHTML = '⚠️ मानचित्र त्रुटि';
                console.warn('Map init error', e);
            }
        }

        function getUserLocation() {
            if (!navigator.geolocation) {
                document.getElementById('user-location-text').textContent = '❌ GPS सपोर्ट नहीं';
                return;
            }
            document.getElementById('user-location-text').textContent = '⏳ ढूँढ रहा...';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLon = pos.coords.longitude;
                    document.getElementById('user-location-text').textContent = userLat.toFixed(6) + ', ' + userLon.toFixed(6);
                    document.getElementById('location-status').textContent = '✅ आपकी लोकेशन मिल गई';
                    if (mapInitialized && map) {
                        if (userMarker) map.removeLayer(userMarker);
                        userMarker = L.marker([userLat, userLon], {
                            icon: L.divIcon({ className: 'location-marker-user', iconSize: [18,18], popupAnchor: [0,-10] })
                        }).addTo(map).bindPopup('📍 आप यहाँ हैं').openPopup();
                        map.setView([userLat, userLon], 15);
                    }
                    updateContactLocationOnMap();
                },
                (err) => {
                    document.getElementById('user-location-text').textContent = '❌ GPS नहीं मिला';
                    document.getElementById('location-status').textContent = '⚠️ ' + err.message;
                    showToast('⚠️ GPS चालू करें और अनुमति दें');
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function setContactLocation() {
            const sel = document.getElementById('chat-contact-select');
            if (!sel || !sel.value) { showToast('❌ पहले संपर्क चुनें'); return; }
            const contact = contacts.find(c => c.id === sel.value);
            if (!contact) { showToast('❌ संपर्क नहीं मिला'); return; }
            const lat = prompt('अक्षांश (Lat) दर्ज करें:', contact.lat || userLat || '28.6139');
            const lon = prompt('देशांतर (Lon) दर्ज करें:', contact.lon || userLon || '77.2090');
            if (lat !== null && lon !== null && lat.trim() && lon.trim()) {
                contact.lat = lat.trim();
                contact.lon = lon.trim();
                saveData();
                renderContacts();
                updateContactLocationOnMap();
                document.getElementById('contact-location-text').textContent = lat.trim() + ', ' + lon.trim();
                showToast('📍 ' + contact.name + ' की लोकेशन सेट');
            }
        }

        function updateContactLocationOnMap() {
            const sel = document.getElementById('chat-contact-select');
            if (!sel || !sel.value) {
                if (contactMarker && map) { map.removeLayer(contactMarker); contactMarker = null; }
                document.getElementById('contact-location-text').textContent = '⏳ सेट करें';
                return;
            }
            const contact = contacts.find(c => c.id === sel.value);
            if (!contact || !contact.lat || !contact.lon) {
                if (contactMarker && map) { map.removeLayer(contactMarker); contactMarker = null; }
                document.getElementById('contact-location-text').textContent = '⏳ सेट करें';
                return;
            }
            const lat = parseFloat(contact.lat);
            const lon = parseFloat(contact.lon);
            if (isNaN(lat) || isNaN(lon)) {
                document.getElementById('contact-location-text').textContent = '⚠️ अमान्य';
                return;
            }
            document.getElementById('contact-location-text').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6);
            if (mapInitialized && map) {
                if (contactMarker) map.removeLayer(contactMarker);
                contactMarker = L.marker([lat, lon], {
                    icon: L.divIcon({ className: 'location-marker-contact', iconSize: [18,18], popupAnchor: [0,-10] })
                }).addTo(map).bindPopup('📍 ' + contact.name + ' की लोकेशन').openPopup();
                if (userLat && userLon) {
                    const bounds = L.latLngBounds([[userLat, userLon], [lat, lon]]);
                    map.fitBounds(bounds, { padding: [50,50] });
                } else {
                    map.setView([lat, lon], 13);
                }
            }
        }

        function updateContactLocationDisplay() {
            const sel = document.getElementById('chat-contact-select');
            if (!sel || !sel.value) {
                document.getElementById('contact-location-text').textContent = '⏳ सेट करें';
                return;
            }
            const contact = contacts.find(c => c.id === sel.value);
            if (contact && contact.lat && contact.lon) {
                document.getElementById('contact-location-text').textContent = contact.lat + ', ' + contact.lon;
            } else {
                document.getElementById('contact-location-text').textContent = '⏳ सेट करें';
            }
        }

        // ================================================================
        // 10. Location Link Copy & Share
        // ================================================================
        function getLocationLink() {
            if (userLat && userLon) {
                return 'https://www.google.com/maps?q=' + userLat + ',' + userLon;
            } else {
                // Fallback: contact's location if available
                const sel = document.getElementById('chat-contact-select');
                if (sel && sel.value) {
                    const contact = contacts.find(c => c.id === sel.value);
                    if (contact && contact.lat && contact.lon) {
                        return 'https://www.google.com/maps?q=' + contact.lat + ',' + contact.lon;
                    }
                }
                return null;
            }
        }

        function copyLocationLink() {
            const link = getLocationLink();
            if (!link) { showToast('❌ लोकेशन उपलब्ध नहीं'); return; }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(() => {
                    showToast('✅ लोकेशन लिंक कॉपी हो गया!');
                }).catch(() => {
                    fallbackCopy(link);
                });
            } else {
                fallbackCopy(link);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed'; ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); showToast('✅ लिंक कॉपी हो गया!'); } catch(e) { showToast('❌ कॉपी नहीं हुआ'); }
            document.body.removeChild(ta);
        }

        function shareLocation() {
            const link = getLocationLink();
            if (!link) { showToast('❌ लोकेशन उपलब्ध नहीं'); return; }
            if (navigator.share) {
                navigator.share({
                    title: 'मेरी लोकेशन',
                    text: 'यहाँ देखें: ' + link,
                    url: link
                }).catch(() => { /* user cancelled */ });
            } else {
                // Fallback: copy link
                copyLocationLink();
                showToast('📋 शेयर नहीं हो सका, लिंक कॉपी कर लिया गया');
            }
        }

        // ================================================================
        // 11. Tab Switching
        // ================================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.toggle('active', el.id === 'tab-' + tab);
            });
            if (tab === 'location') {
                setTimeout(() => {
                    if (!mapInitialized) initMap();
                    else {
                        if (map) setTimeout(() => map.invalidateSize(), 200);
                        getUserLocation();
                        updateContactLocationOnMap();
                    }
                }, 300);
            }
            if (tab === 'chat') updateChatPreview();
        }

        // ================================================================
        // 12. Toast & Refresh
        // ================================================================
        function showToast(msg) {
            const el = document.getElementById('toast');
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 3000);
        }

        function refreshAll() {
            renderContacts();
            updateChatSelect();
            updateChatPreview();
            if (mapInitialized && map) {
                getUserLocation();
                updateContactLocationOnMap();
            }
            showToast('🔄 सब ताज़ा हो गया');
        }

        // ================================================================
        // 13. Event listeners on load
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderContacts();
            updateChatSelect();
            updateChatPreview();

            // Chat select change
            document.getElementById('chat-contact-select')?.addEventListener('change', function() {
                selectedContactId = this.value || null;
                updateChatPreview();
                if (document.getElementById('tab-location').classList.contains('active')) {
                    updateContactLocationOnMap();
                }
                updateContactLocationDisplay();
            });

            // Message input live translation
            document.getElementById('message-input')?.addEventListener('input', function() {
                const text = this.value.trim();
                if (text && /[अ-हा-ज]/.test(text)) {
                    translateAsync(text);
                } else {
                    document.getElementById('translation-box')?.classList.add('hidden');
                }
            });

            if (window.location.hash === '#location') switchTab('location');

            console.log('📱 WhatsApp कनेक्ट लोड हो गया!');
            console.log('👥 ' + contacts.length + ' संपर्क, ' + chatHistory.length + ' संदेश');
        });

        window.addEventListener('beforeunload', function() {
            if (isRecording) stopVoice();
        });

        console.log('🚀 WhatsApp कनेक्ट – अब लोकेशन कॉपी और शेयर भी!');
    </script>

</body>
</html>
