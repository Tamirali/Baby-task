<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to Hindi Sentence Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
            margin-top: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #2575fc;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            color: #6a11cb;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .game-area {
            margin-bottom: 30px;
        }
        
        .sentence-container {
            background-color: #f0f8ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 3px dashed #6a11cb;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .sentence {
            font-size: 1.8rem;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: center;
            color: #333;
        }
        
        .blank {
            display: inline-block;
            width: 130px;
            height: 45px;
            border-bottom: 3px solid #ff6b6b;
            margin: 0 8px;
            vertical-align: middle;
            position: relative;
            background-color: #fff;
            border-radius: 5px;
            text-align: center;
            line-height: 45px;
            font-weight: bold;
            color: transparent;
            text-shadow: 0 0 0 #333;
            transition: all 0.3s;
        }
        
        .blank.filled {
            border-bottom: 3px solid #4ecdc4;
            background-color: #f7fff7;
            color: #333;
        }
        
        .blank.correct {
            border-bottom: 3px solid #28a745;
            background-color: #d4edda;
            color: #155724;
        }
        
        .blank.incorrect {
            border-bottom: 3px solid #dc3545;
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .option {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .option:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .option:disabled {
            background: #cccccc;
            color: #666666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .hint {
            text-align: center;
            margin-bottom: 10px;
            font-style: italic;
            color: #6a11cb;
            font-size: 1.1rem;
            background-color: #e6f7ff;
            padding: 10px;
            border-radius: 10px;
            border-left: 5px solid #2575fc;
        }
        
        .hindi-answer {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: #2e8b57;
            background-color: #f0fff0;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #2e8b57;
            font-weight: bold;
        }
        
        .result {
            text-align: center;
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            padding: 10px;
            border-radius: 10px;
        }
        
        .result.correct {
            color: #2e8b57;
            background-color: #f0fff0;
            border: 2px solid #2e8b57;
        }
        
        .result.incorrect {
            color: #dc143c;
            background-color: #fff0f5;
            border: 2px solid #dc143c;
        }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            width: 100%;
        }
        
        .score {
            font-size: 1.4rem;
            color: #6a11cb;
            background-color: #e6e6fa;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
        }
        
        .progress {
            font-size: 1.2rem;
            color: #2575fc;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 { font-size: 1.8rem; }
            .sentence { font-size: 1.4rem; }
            .blank { width: 100px; height: 40px; line-height: 40px; }
            .option { padding: 10px 15px; font-size: 1rem; }
        }
        
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
        
        .auto-next-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            color: #6a11cb;
            font-style: italic;
        }
    </style>
</head>

            { english: "You ___ a painting", blanks: ["paint"], options: ["paint", "draw", "color", "make"], hindi: "तुम एक पेंटिंग बनाते हो", hint: "Create an image with colors" }
        ];

        // Game state variables
        let currentSentenceIndex = 0;
        let score = 0;
        let blanksFilled = 0;
        let totalBlanks = 0;

        // DOM elements
        const sentenceElement = document.getElementById('sentence');
        const optionsElement = document.getElementById('options');
        const hintElement = document.getElementById('hint');
        const hindiAnswerElement = document.getElementById('hindi-answer');
        const resultElement = document.getElementById('result');
        const scoreElement = document.getElementById('score');
        const progressElement = document.getElementById('progress');
        const celebrationElement = document.getElementById('celebration');

        // Initialize the game
        function initGame() {
            currentSentenceIndex = 0;
            score = 0;
            updateScore();
            updateProgress();
            loadSentence(currentSentenceIndex);
        }

        // Load a sentence into the game
        function loadSentence(index) {
            const sentenceData = sentences[index];
            const sentenceText = sentenceData.english;
            const blanks = sentenceData.blanks;
            const options = [...sentenceData.options];
            
            blanksFilled = 0;
            totalBlanks = blanks.length;
            resultElement.textContent = '';
            resultElement.className = 'result';
            
            hintElement.textContent = `Hint: ${sentenceData.hint}`;
            hindiAnswerElement.textContent = `Hindi: ${sentenceData.hindi}`;
            
            let displaySentence = sentenceText;
            blanks.forEach(blank => {
                displaySentence = displaySentence.replace('___', `<span class="blank" data-correct="${blank}"></span>`);
            });
            
            sentenceElement.innerHTML = displaySentence;
            
            optionsElement.innerHTML = '';
            shuffleArray(options).forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.addEventListener('click', () => selectOption(option));
                optionsElement.appendChild(button);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function selectOption(option) {
            const blanks = document.querySelectorAll('.blank:not(.filled)');
            if (blanks.length > 0) {
                const blank = blanks[0];
                blank.textContent = option;
                blank.classList.add('filled');
                blank.dataset.selected = option;
                blanksFilled++;
                
                const optionButtons = document.querySelectorAll('.option');
                optionButtons.forEach(button => {
                    if (button.textContent === option) {
                        button.disabled = true;
                    }
                });
                
                if (blanksFilled === totalBlanks) {
                    checkAnswer();
                }
            }
        }

        function checkAnswer() {
            const blanks = document.querySelectorAll('.blank');
            let allCorrect = true;
            
            blanks.forEach(blank => {
                const correct = blank.dataset.correct;
                const selected = blank.dataset.selected;
                
                if (correct === selected) {
                    blank.classList.add('correct');
                } else {
                    blank.classList.add('incorrect');
                    allCorrect = false;
                }
            });
            
            if (allCorrect) {
                resultElement.textContent = 'Correct! Well done!';
                resultElement.className = 'result correct';
                score++;
                updateScore();
                createCelebration();
                
                setTimeout(() => {
                    nextSentence();
                }, 1500);
            } else {
                resultElement.textContent = 'Wrong! Try again.';
                resultElement.className = 'result incorrect';
                
                setTimeout(() => {
                    const optionButtons = document.querySelectorAll('.option');
                    optionButtons.forEach(button => {
                        button.disabled = false;
                    });
                    
                    blanks.forEach(blank => {
                        blank.textContent = '';
                        blank.classList.remove('filled', 'correct', 'incorrect');
                        delete blank.dataset.selected;
                    });
                    
                    blanksFilled = 0;
                }, 1200);
            }
        }

        function nextSentence() {
            currentSentenceIndex = (currentSentenceIndex + 1) % sentences.length;
            updateProgress();
            loadSentence(currentSentenceIndex);
        }

        function updateScore() {
            scoreElement.textContent = `Score: ${score}`;
        }

        function updateProgress() {
            progressElement.textContent = `Question: ${currentSentenceIndex + 1}/${sentences.length}`;
        }

        function createCelebration() {
            celebrationElement.style.display = 'block';
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                celebrationElement.appendChild(confetti);
                
                setTimeout(() => { confetti.remove(); }, 5000);
            }
            
            setTimeout(() => {
                celebrationElement.style.display = 'none';
                celebrationElement.innerHTML = '';
            }, 3000);
        }

        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
